[package]
name = "apis-saltans-hw"
description = "Zigbee hardware library."
authors = ["Richard Neumann <neumann@paulmann.de>"]
license = "MIT"
repository = "https://github.com/PaulmannLighting/apis-saltans"
keywords = ["zigbee", "hardware", "library"]
categories = ["network-programming"]
documentation = "https://docs.rs/apis-saltans-hw"
version = "0.7.0"
edition = "2024"
exclude = [".gitignore", "ARCHITECTURE.md", "TODO.md"]

[dependencies]
apis-saltans-aps = { version = "0.4", path = "../aps", optional = true }
apis-saltans-core = { version = "0.5", path = "../core", optional = true }
apis-saltans-nwk = { version = "0.2", path = "../nwk", optional = true }
apis-saltans-zdp = { version = "0.4", path = "../zdp", optional = true }
bytes = { version = "1.12.0", optional = true }
tokio = { version = "1", features = ["sync"], optional = true }

[features]
default = []
coordinator = [
    "dep:apis-saltans-aps",
    "dep:apis-saltans-core",
    "dep:apis-saltans-nwk",
    "dep:bytes",
    "dep:tokio",
]
driver-use = [
    "dep:apis-saltans-aps",
    "dep:apis-saltans-core",
    "dep:apis-saltans-nwk",
    "dep:apis-saltans-zdp",
    "dep:bytes",
    "dep:tokio"
]
driver = [
    "driver-use"
]

[lints]
workspace = true
