[package]
name = "zigbee-coordinator"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = "0.4"
const_env = "0.1"
le-stream = { version = "9", features = ["derive"] }
log = "0.4"
macaddr = "1"
tokio = { version = "1", features = ["sync", "rt", "rt-multi-thread", "time"] }
zcl = { path = "../zcl", version = "0.1" }
zdp = { path = "../zdp", version = "0.1" }
zigbee = { path = "../zigbee", version = "0.1" }
zigbee-hw = { path = "../zigbee-hw", version = "0.1" }

[lints]
workspace = true
