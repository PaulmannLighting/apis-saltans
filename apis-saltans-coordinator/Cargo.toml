[package]
name = "apis-saltans-coordinator"
version = "0.1.0"
edition = "2024"

[dependencies]
apis-saltans-aps = { path = "../apis-saltans-aps", version = "0.1" }
apis-saltans-core = { path = "../apis-saltans-core", version = "0.1", features = ["serde", "serde_with"] }
apis-saltans-hw = { path = "../apis-saltans-hw", version = "0.1" }
apis-saltans-zcl = { path = "../apis-saltans-zcl", version = "0.1", features = ["serde"] }
apis-saltans-zdp = { path = "../apis-saltans-zdp", version = "0.1", features = ["serde"] }
const_env = "0.1"
le-stream = { version = "10", features = ["derive"] }
log = "0.4"
macaddr = "1"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["sync", "rt", "rt-multi-thread", "time"] }
tokio-task-pool = "0.1"

[lints]
workspace = true
